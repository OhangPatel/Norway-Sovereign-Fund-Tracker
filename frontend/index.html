<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Sovereign Insights</title>
    <style>
      :root[data-theme="dark"] {
        --bg: #0a0a0a;
        --bg-2: #141414;
        --surface: #1a1a1a;
        --surface-2: #242424;
        --hairline: #333333;
        --hairline-strong: #4a4a4a;
        --ink: #ffffff;
        --ink-2: #b3b3b3;
        --muted: #808080;
        --muted-2: #5a5a5a;
        --accent: #4f98ff;
        --accent-ink: #ffffff;
        --info: #00d9ff;
        --pos: #10b981;
        --neg: #ef4444;
        --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --font-mono: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, "Courier New", monospace;
        --font-display: "Georgia", serif;
      }

      :root[data-theme="light"] {
        --bg: #fafafa;
        --bg-2: #f0f0f0;
        --surface: #ffffff;
        --surface-2: #f5f5f5;
        --hairline: #e5e5e5;
        --hairline-strong: #d0d0d0;
        --ink: #0a0a0a;
        --ink-2: #4d4d4d;
        --muted: #808080;
        --muted-2: #a6a6a6;
        --accent: #0066cc;
        --accent-ink: #ffffff;
        --info: #0099cc;
        --pos: #059669;
        --neg: #dc2626;
        --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --font-mono: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, "Courier New", monospace;
        --font-display: "Georgia", serif;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font-ui);
        line-height: 1.5;
      }

      .display { font-family: var(--font-display); font-size: 32px; font-weight: 400; }
      .display-italic { font-style: italic; }
      .eyebrow { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 500; }
      .mono { font-family: var(--font-mono); }
      .card { background: var(--surface); border: 1px solid var(--hairline); border-radius: 12px; }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      @keyframes rise {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      svg { display: block; }

      @keyframes pipeShimmer {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(400%);  }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
